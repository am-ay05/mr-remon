<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء أكواد تفعيل مجمعة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ... (أكواد الـ CSS) ... */
:root {
--primary-color: #06467A;
--secondary-color: #A29BFE;
--dark-color: #2D3436;
--light-color: #F5F6FA;
--success-color: #27ae60;
--danger-color: #c0392b;
}
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Tajawal', sans-serif;
}
body {
background-color: var(--light-color);
color: var(--dark-color);
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
padding: 20px;
}
.container {
width: 100%;
max-width: 550px;
padding: 30px;
background-color: white;
border-radius: 15px;
box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
}
.form-title {
font-size: 26px;
font-weight: bold;
margin-bottom: 24px;
color: var(--primary-color);
text-align: center;
}
.form-group {
margin-bottom: 20px;
text-align: right;
}
.form-group label {
display: block;
margin-bottom: 8px;
font-weight: 700;
}
.form-control, .form-select {
width: 100%;
padding: 12px;
border: 1px solid #ddd;
border-radius: 8px;
font-size: 16px;
background-color: #fafafa;
}
.month-selection {
border: 1px solid #ddd;
padding: 15px;
border-radius: 10px;
margin-top: 20px;
background-color: #f9f9f9;
max-height: 150px;
overflow-y: auto;
}
.month-item {
display: flex;
align-items: center;
margin-bottom: 10px;
padding: 5px;
}
.month-item input[type="checkbox"] {
margin-left: 10px;
width: 18px;
height: 18px;
accent-color: var(--primary-color);
}
.month-item label {
font-weight: 500;
cursor: pointer;
}
.btn {
width: 100%;
margin-top: 20px;
padding: 14px;
border: none;
border-radius: 8px;
background-color: var(--primary-color);
color: white;
font-size: 18px;
font-weight: bold;
cursor: pointer;
transition: background-color 0.3s;
display: flex;
justify-content: center;
align-items: center;
gap: 10px;
}
.btn:disabled {
background-color: var(--secondary-color);
cursor: not-allowed;
}
.btn-danger {
background-color: var(--danger-color);
}
.btn-danger:hover {
background-color: #a93226;
}
.loading-spinner {
border: 3px solid rgba(255, 255, 255, 0.3);
border-top: 3px solid #fff;
border-radius: 50%;
width: 20px;
height: 20px;
animation: spin 1s linear infinite;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.result-card {
text-align: center;
margin-top: 30px;
padding: 20px;
border-radius: 10px;
background-color: #f0fdf4;
border: 1px solid var(--success-color);
display: none; /* Initially hidden */
}
.generated-codes {
width: 100%;
height: 150px;
padding: 10px;
font-size: 16px;
font-family: monospace;
resize: vertical;
border: 1px solid #ddd;
border-radius: 8px;
margin-bottom: 10px;
direction: ltr; /* Ensure codes are LTR */
}
.copy-btn {
padding: 8px 15px;
font-size: 14px;
background-color: var(--secondary-color);
color: white;
border: none;
border-radius: 6px;
cursor: pointer;
transition: background-color 0.3s;
}
.copy-btn:hover {
background-color: #8a7dfd;
}
.alert {
padding: 12px;
border-radius: 8px;
margin-top: 16px;
font-weight: 500;
text-align: center;
}
.alert-danger {
background-color: #f8d7da;
color: #721c24;
}
.alert-success {
background-color: #d4edda;
color: #155724;
}
.danger-zone {
margin-top: 40px;
padding-top: 20px;
border-top: 2px dashed #ddd;
text-align: center;
}
.danger-title {
color: var(--danger-color);
font-size: 18px;
margin-bottom: 10px;
font-weight: bold;
}
</style>
</head>
<body>

<div id="page-content" style="display: none;">
<div class="container">
<h2 class="form-title">إنشاء أكواد تفعيل مجمعة</h2>
<div id="alert-message"></div>

<div class="form-group">
<label for="teacher-select">1. اختر المدرس/السيرفر</label>
<select id="teacher-select" class="form-select">
<option value="" disabled selected>اختر مدرساً...</option>
</select>
</div>

<div class="form-group">
<label>2. اختر الشهور المراد تفعيلها</label>
<div id="months-list" class="month-selection">
<p style="color: #888;">اختر مدرساً أولاً لعرض الشهور المتاحة...</p>
</div>
</div>

<div class="form-group">
<label for="code-count">3. حدد عدد الأكواد</label>
<input type="number" id="code-count" class="form-control" value="1" min="1" max="100">
</div>

<button id="generate-btn" class="btn" disabled>
<span>إنشاء الأكواد</span>
</button>

<div id="result-card" class="result-card">
<h4>تم إنشاء الأكواد بنجاح:</h4>
<textarea id="generated-codes-display" class="generated-codes" readonly></textarea>
<button id="copy-btn" class="copy-btn">نسخ جميع الأكواد</button>
</div>

<div class="danger-zone">
<h3 class="danger-title">⚠ منطقة الخطر</h3>
<p style="font-size: 14px; color: #666; margin-bottom: 15px;">احذر: هذا الزر سيقوم بحذف <strong>جميع</strong> الأكواد الموجودة في قاعدة البيانات (المستخدمة وغير المستخدمة).</p>
<button id="delete-all-btn" class="btn btn-danger">
<span>حذف جميع الأكواد من قاعدة البيانات</span>
</button>
</div>

</div>
</div> 

<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script> 
<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>

<script>
// ==========================================================
// إعدادات Firebase
// ==========================================================
const firebaseConfig = {
    apiKey: 'AIzaSyDlY3cXLhUTA90hm4W-ciYXFgNGGt5lLf0',
    appId: '1:416921782729:web:b6ef2937c0f21c36930018',
    messagingSenderId: '416921782729',
    projectId: 'remon-c7d79',
    authDomain: 'remon-c7d79.firebaseapp.com',
    databaseURL: 'https://remon-c7d79-default-rtdb.firebaseio.com',
    storageBucket: 'remon-c7d79.firebasestorage.app',
    measurementId: 'G-CPXH58TKN3',
};

// Initialize Firebase
if (!firebase.apps.length) {
firebase.initializeApp(firebaseConfig);
}

// ==========================================================
// ========== حارس الأمان (Admin Guard) ==========
// ==========================================================
const auth = firebase.auth();
const database = firebase.database();

auth.onAuthStateChanged(user => {
if (user) {
database.ref(`admins/${user.uid}`).once('value', snapshot => {
if (snapshot.exists()) {
console.log('Admin access granted.');
document.getElementById('page-content').style.display = 'block';
initializeAppLogic(); // بدء التطبيق
} else {
alert('ليس لديك صلاحيات الوصول لهذه الصفحة.');
auth.signOut();
window.location.href = 'index.html';
}
});
} else {
console.log('User not logged in. Redirecting...');
window.location.href = 'index.html';
}
});

// ==========================================================
// ========== منطق التطبيق ==========
// ==========================================================
function initializeAppLogic() {

const codesRef = database.ref('codes');
const monthsRef = database.ref('months');

// DOM Elements
const teacherSelect = document.getElementById('teacher-select');
const monthsListDiv = document.getElementById('months-list');
const codeCountInput = document.getElementById('code-count');
const generateBtn = document.getElementById('generate-btn');
const resultCard = document.getElementById('result-card');
const codeDisplay = document.getElementById('generated-codes-display');
const copyBtn = document.getElementById('copy-btn');
const alertMessageDiv = document.getElementById('alert-message');
const deleteAllBtn = document.getElementById('delete-all-btn'); // زر الحذف الجديد

// Populate teacher dropdown menu
for (let i = 1; i <= 4; i++) {
const option = document.createElement('option');
const teacherName = `مدرس ${i}`;
option.value = teacherName;
option.textContent = teacherName;
teacherSelect.appendChild(option);
}

// دالة عرض التنبيهات (تم تحديثها لتقبل نوع التنبيه)
function showAlert(message, type = 'danger') {
alertMessageDiv.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
setTimeout(() => { alertMessageDiv.innerHTML = ''; }, 4000);
}

async function fetchMonths() {
const selectedTeacher = teacherSelect.value;
if (!selectedTeacher) return;

monthsListDiv.innerHTML = '<p>جاري تحميل الشهور...</p>';
generateBtn.disabled = true;

try {
const snapshot = await monthsRef.child(selectedTeacher).once('value');
const monthsData = snapshot.val();

monthsListDiv.innerHTML = '';

if (snapshot.exists()) {
const monthsArray = Object.entries(monthsData).map(([key, value]) => ({ id: key, ...value }));
monthsArray.sort((a, b) => (a.order || 999) - (b.order || 999));

monthsArray.forEach(month => {
const monthDiv = document.createElement('div');
monthDiv.className = 'month-item';
monthDiv.innerHTML = `
<input type="checkbox" id="month-${month.id}" data-month-id="${month.id}">
<label for="month-${month.id}">${month.name || 'شهر غير مسمى'}</label>
`;
monthsListDiv.appendChild(monthDiv);
});
generateBtn.disabled = false;
} else {
monthsListDiv.innerHTML = '<p style="color: #888;">لا توجد شهور مُضافة لهذا المدرس.</p>';
}
} catch (error) {
console.error("Error fetching months:", error);
monthsListDiv.innerHTML = '<p style="color: red;">خطأ في تحميل الشهور.</p>';
}
}

function generateRandomCode() {
// كود من 11 رقم
const chars = '0123456789'; 
let code = '';
for (let i = 0; i < 11; i++) {
code += chars.charAt(Math.floor(Math.random() * chars.length));
}
return code;
}


async function generateAndSaveCodes() {
generateBtn.disabled = true;
generateBtn.innerHTML = '<span class="loading-spinner"></span><span>جاري الإنشاء...</span>';
resultCard.style.display = 'none';
alertMessageDiv.innerHTML = '';

const selectedServer = teacherSelect.value;
const selectedMonthCheckboxes = monthsListDiv.querySelectorAll('input[type="checkbox"]:checked');
const selectedMonthIds = Array.from(selectedMonthCheckboxes).map(cb => cb.dataset.monthId);
const codeCount = parseInt(codeCountInput.value) || 1;

if (!selectedServer || selectedMonthIds.length === 0) {
showAlert('الرجاء اختيار مدرس وشهر واحد على الأقل.');
generateBtn.disabled = false;
generateBtn.innerHTML = '<span>إنشاء الأكواد</span>';
return;
}

try {
const updates = {};
const generatedCodes = [];

for (let i = 0; i < codeCount; i++) {
let newCode;
let isCodeUnique = false;
do {
newCode = generateRandomCode();
const snapshot = await codesRef.child(newCode).get();
if (!snapshot.exists()) {
isCodeUnique = true;
}
} while (!isCodeUnique);

updates[newCode] = {
server: selectedServer,
isUsed: false,
months: selectedMonthIds
};
generatedCodes.push(newCode);
}

// Save all codes in one batch
await codesRef.update(updates);

codeDisplay.value = generatedCodes.join('\n');
resultCard.style.display = 'block';
selectedMonthCheckboxes.forEach(cb => cb.checked = false);
showAlert('تم إنشاء الأكواد وحفظها بنجاح.', 'success');

} catch (error) {
console.error("Error generating codes:", error);
showAlert('حدث خطأ أثناء إنشاء الأكواد. تأكد من اتصالك بالإنترنت.');
} finally {
generateBtn.disabled = false;
generateBtn.innerHTML = '<span>إنشاء الأكواد</span>';
}
}

// ==========================================================
// وظيفة حذف جميع الأكواد (الجديدة)
// ==========================================================
async function deleteAllCodes() {
// رسالة تأكيد أولى
if (!confirm("⚠️ تحذير خطير جداً!\n\nهل أنت متأكد أنك تريد حذف جميع الأكواد من قاعدة البيانات؟\nسيتم حذف الأكواد المستخدمة وغير المستخدمة نهائياً.")) {
return;
}

// رسالة تأكيد ثانية للأمان
if (!confirm("تأكيد نهائي: هذا الإجراء لا يمكن التراجع عنه.\nهل أنت متأكد من الحذف؟")) {
return;
}

deleteAllBtn.disabled = true;
deleteAllBtn.innerHTML = '<span class="loading-spinner"></span><span>جاري الحذف...</span>';

try {
// حذف النود 'codes' بالكامل
await codesRef.remove();
showAlert('تم حذف جميع الأكواد من قاعدة البيانات بنجاح.', 'success');
// إخفاء كارت النتائج إذا كان ظاهراً
resultCard.style.display = 'none';
codeDisplay.value = '';
} catch (error) {
console.error("Error deleting codes:", error);
showAlert('حدث خطأ أثناء محاولة حذف الأكواد.', 'danger');
} finally {
deleteAllBtn.disabled = false;
deleteAllBtn.innerHTML = '<span>حذف جميع الأكواد من قاعدة البيانات</span>';
}
}

// Event Listeners
teacherSelect.addEventListener('change', fetchMonths);
generateBtn.addEventListener('click', generateAndSaveCodes);
deleteAllBtn.addEventListener('click', deleteAllCodes); // ربط زر الحذف

copyBtn.addEventListener('click', () => {
codeDisplay.select();
document.execCommand('copy');
copyBtn.textContent = 'تم النسخ!';
setTimeout(() => { copyBtn.textContent = 'نسخ جميع الأكواد'; }, 2000);
});

} // إغلاق دالة initializeAppLogic
</script>
</body>
</html>
