<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نشر البوستات | AMG</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4F46E5;
            --primary-hover: #4338ca;
            --secondary-color: #818cf8;
            --background-color: #F3F4F6;
            --surface-color: #FFFFFF;
            --text-primary: #1F2937;
            --text-secondary: #6B7280;
            --border-color: #E5E7EB;
            --success-color: #10B981;
            --danger-color: #EF4444;
            --danger-hover: #DC2626;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --primary-color: #6366f1;
            --primary-hover: #818cf8;
            --secondary-color: #4f46e5;
            --background-color: #111827;
            --surface-color: #1F2937;
            --text-primary: #F9FAFB;
            --text-secondary: #D1D5DB;
            --border-color: #374151;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
        }

        * { box-sizing: border-box; outline: none; }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--background-color);
            color: var(--text-primary);
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Top Bar */
        .top-bar {
            width: 100%; max-width: 800px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; margin-bottom: 10px;
        }

        .back-btn-top {
            text-decoration: none; color: var(--text-secondary);
            font-weight: 500; display: flex; align-items: center; gap: 8px;
            transition: var(--transition); padding: 8px 16px;
            border-radius: var(--radius); background: var(--surface-color);
            box-shadow: var(--shadow-sm);
        }
        .back-btn-top:hover { color: var(--primary-color); transform: translateX(-5px); }

        .theme-toggle {
            background: var(--surface-color); border: 1px solid var(--border-color);
            color: var(--text-primary); padding: 10px; border-radius: 50%;
            cursor: pointer; box-shadow: var(--shadow-sm); transition: var(--transition);
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
        }
        .theme-toggle:hover { background: var(--border-color); }

        /* Container & Layout */
        .container {
            width: 95%; max-width: 800px;
            background-color: var(--surface-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 0; margin-bottom: 40px;
            overflow: hidden; border: 1px solid var(--border-color);
        }

        .appbar {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white; padding: 30px 20px;
            text-align: center;
        }
        .appbar h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }

        .content-body { padding: 30px; }

        /* Inputs */
        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block; margin-bottom: 8px; font-weight: 500;
            color: var(--text-primary); font-size: 14px;
        }
        .input-group input, .input-group select, .input-group textarea {
            width: 100%; padding: 14px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius);
            background-color: var(--background-color);
            color: var(--text-primary);
            font-size: 15px; font-family: inherit;
            transition: var(--transition);
        }
        .input-group textarea {
            resize: vertical; min-height: 120px; line-height: 1.5;
        }
        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            background-color: var(--surface-color);
        }

        /* Button */
        .button {
            width: 100%; padding: 16px; border: none; border-radius: var(--radius);
            font-size: 16px; font-weight: 700; color: white; cursor: pointer;
            transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 10px;
            position: relative; overflow: hidden;
        }
        .upload-btn { background-color: var(--success-color); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .upload-btn:hover { background-color: #059669; transform: translateY(-2px); }

        /* History Section */
        .divider { height: 1px; background-color: var(--border-color); margin: 30px 0; }
        h3 {
            color: var(--text-primary); font-size: 20px; border-right: 4px solid var(--primary-color);
            padding-right: 12px; margin-bottom: 20px;
        }

        .post-item {
            background: var(--surface-color); border: 1px solid var(--border-color);
            border-radius: var(--radius); padding: 20px; margin-bottom: 15px;
            box-shadow: var(--shadow-sm); transition: var(--transition);
        }
        .post-item:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        
        .post-header {
            display: flex; justify-content: space-between; margin-bottom: 12px;
            font-size: 13px; color: var(--text-secondary); border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .post-content {
            margin-bottom: 15px; font-size: 16px; white-space: pre-wrap; line-height: 1.6;
        }
        .post-meta {
            display: flex; gap: 10px; font-size: 13px; margin-bottom: 15px;
        }
        .badge {
            padding: 4px 10px; border-radius: 20px; font-weight: 600; font-size: 12px;
        }
        .badge-img { background: rgba(16, 185, 129, 0.1); color: var(--success-color); }
        .badge-pdf { background: rgba(239, 68, 68, 0.1); color: var(--danger-color); }

        .btn-sm-danger {
            background-color: rgba(239, 68, 68, 0.1); color: var(--danger-color);
            border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer;
            font-weight: 600; transition: var(--transition); font-family: inherit;
        }
        .btn-sm-danger:hover { background-color: var(--danger-color); color: white; }

    </style>
</head>
<body>

    <div class="top-bar">
        <a href="activation_stats.html" class="back-btn-top">
            <i class="fas fa-arrow-right"></i> <span>الرئيسية</span>
        </a>
        <button class="theme-toggle" id="themeToggle" title="تبديل الوضع">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <div id="page-content" style="display: none; width: 100%; display:flex; justify-content:center;">
        <div class="container">
            <div class="appbar">
                <h1>نشر بوست جديد</h1>
            </div>

            <div class="content-body">
                <div class="input-group">
                    <label for="serverSelect">اختر السيرفر (السنة الدراسية)</label>
                    <select id="serverSelect">
                        <option value="" disabled selected>جاري التحميل...</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="postContent">محتوى البوست</label>
                    <textarea id="postContent" placeholder="اكتب ما تريد نشره للطلاب هنا..."></textarea>
                </div>

                <div class="input-group">
                    <label for="imageUrl">رابط صورة مرفقة (اختياري)</label>
                    <input type="url" id="imageUrl" placeholder="https://...">
                </div>
                
                <div class="input-group">
                    <label for="pdfUrl">رابط ملف PDF مرفق (اختياري)</label>
                    <input type="url" id="pdfUrl" placeholder="https://...">
                </div>

                <button id="publishBtn" class="button upload-btn">
                    <i class="fas fa-paper-plane"></i> نشر البوست
                </button>

                <div class="divider"></div>

                <h3><i class="fas fa-history"></i> بوستاتي السابقة (لهذا السيرفر)</h3>
                <div id="postsList">
                    <p style="text-align: center; color: var(--text-secondary);">جاري تحميل البوستات...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-database-compat.js"></script>

    <script>
        // --- Dark Mode Logic ---
        const themeToggle = document.getElementById('themeToggle');
        const icon = themeToggle.querySelector('i');
        
        if(localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            icon.classList.remove('fa-moon'); icon.classList.add('fa-sun');
        }

        themeToggle.addEventListener('click', () => {
            if (document.documentElement.getAttribute('data-theme') === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                icon.classList.remove('fa-sun'); icon.classList.add('fa-moon');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                icon.classList.remove('fa-moon'); icon.classList.add('fa-sun');
            }
        });

        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: 'AIzaSyDlY3cXLhUTA90hm4W-ciYXFgNGGt5lLf0',
            appId: '1:416921782729:web:b6ef2937c0f21c36930018',
            messagingSenderId: '416921782729',
            projectId: 'remon-c7d79',
            authDomain: 'remon-c7d79.firebaseapp.com',
            databaseURL: 'https://remon-c7d79-default-rtdb.firebaseio.com',
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let allowedServers = [];
        let currentUser = null;

        // UI Refs
        const serverSelect = document.getElementById('serverSelect');
        const imageUrlInput = document.getElementById('imageUrl');
        const pdfUrlInput = document.getElementById('pdfUrl');
        const publishBtn = document.getElementById('publishBtn');
        const postsList = document.getElementById('postsList');

        serverSelect.addEventListener('change', () => loadMyPosts());

        // --- Auth & Init ---
        auth.onAuthStateChanged(async user => {
            if (user) {
                currentUser = user;
                try {
                    const adminSnap = await db.ref(`admins/${user.uid}`).once('value');
                    const teaSnap = await db.ref(`tea/${user.uid}`).once('value');

                    if (adminSnap.exists()) {
                        allowedServers = [];
                        for(let i=1; i<=25; i++) allowedServers.push(`مدرس ${i}`);
                        initUI();
                    } else if (teaSnap.exists()) {
                        const val = teaSnap.val();
                        allowedServers = String(val).split('.').map(t => t.trim());
                        initUI();
                    } else {
                        alert('غير مصرح لك بالدخول.');
                        auth.signOut();
                        window.location.href = 'index.html';
                    }
                } catch(e) { console.error(e); }
            } else {
                window.location.href = 'index.html';
            }
        });

        function initUI() {
            document.getElementById('page-content').style.display = 'flex';
            serverSelect.innerHTML = '<option value="" disabled selected>-- اختر السيرفر --</option>';
            allowedServers.forEach(srv => {
                const opt = document.createElement('option');
                opt.value = srv;
                opt.textContent = srv;
                serverSelect.appendChild(opt);
            });
            if(allowedServers.length === 1) {
                serverSelect.value = allowedServers[0];
                loadMyPosts();
            }
        }

        // --- Upload Logic ---
        publishBtn.addEventListener('click', async () => {
            const content = document.getElementById('postContent').value.trim();
            const server = serverSelect.value;
            const imgUrl = imageUrlInput.value.trim();
            const pdfUrl = pdfUrlInput.value.trim();

            if (!server) return alert('يرجى اختيار السيرفر (السنة الدراسية)');
            if (!content && !imgUrl && !pdfUrl) return alert('يجب كتابة نص أو وضع رابط على الأقل');

            publishBtn.disabled = true;
            publishBtn.innerHTML = 'جاري النشر...';

            try {
                const postRef = db.ref(`posts/${server}`).push();
                
                const postData = {
                    user: currentUser.email || "Anonymous",
                    post: content,
                    images: imgUrl ? [imgUrl] : [],
                    pdf: pdfUrl || null,
                    timestamp: new Date().toISOString(),
                    likes: []
                };

                await postRef.set(postData);

                alert('تم نشر البوست بنجاح!');
                // Reset
                document.getElementById('postContent').value = '';
                imageUrlInput.value = '';
                pdfUrlInput.value = '';
                loadMyPosts();

            } catch (error) {
                console.error(error);
                alert('حدث خطأ: ' + error.message);
            } finally {
                publishBtn.disabled = false;
                publishBtn.innerHTML = '<i class="fas fa-paper-plane"></i> نشر البوست';
            }
        });

        // --- Load Posts ---
        function loadMyPosts() {
            const server = serverSelect.value;
            if(!server) return;

            postsList.innerHTML = '<p style="text-align:center; color:var(--text-secondary);">جاري التحميل...</p>';
            
            db.ref(`posts/${server}`).limitToLast(50).once('value', snapshot => {
                postsList.innerHTML = '';
                
                if (!snapshot.exists()) {
                    postsList.innerHTML = '<p style="text-align:center; color:var(--text-secondary);">لا توجد بوستات منشورة في هذا السيرفر.</p>';
                    return;
                }

                const posts = [];
                snapshot.forEach(child => {
                    const p = child.val();
                    p.key = child.key;
                    posts.push(p);
                });

                posts.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                posts.forEach(post => {
                    const el = document.createElement('div');
                    el.className = 'post-item';
                    
                    let metaHtml = '';
                    if(post.images && post.images.length > 0) {
                          metaHtml += `<span class="badge badge-img"><i class="fas fa-images"></i> صور مرفقة</span>`;
                    }
                    if(post.pdf) {
                        metaHtml += `<span class="badge badge-pdf"><i class="fas fa-file-pdf"></i> ملف PDF</span>`;
                    }

                    let userDisplay = post.user ? post.user.split('@')[0] : 'Anonymous';
                    const dateStr = new Date(post.timestamp).toLocaleDateString('ar-EG');
                    const timeStr = new Date(post.timestamp).toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'});

                    el.innerHTML = `
                        <div class="post-header">
                            <span><i class="fas fa-user-circle"></i> ${userDisplay}</span>
                            <span>${dateStr} - ${timeStr}</span>
                        </div>
                        <div class="post-content">${post.post || '<span style="color:var(--text-secondary); font-style:italic;">بدون نص</span>'}</div>
                        <div class="post-meta">${metaHtml}</div>
                        <div style="display:flex; justify-content:flex-end;">
                            <button class="btn-sm-danger" onclick="deletePost('${server}', '${post.key}')">
                                <i class="fas fa-trash-alt"></i> حذف البوست
                            </button>
                        </div>
                    `;
                    postsList.appendChild(el);
                });
            });
        }

        window.deletePost = async function(server, key) {
            if(!confirm('هل أنت متأكد من حذف هذا البوست؟ لا يمكن التراجع عن هذا الإجراء.')) return;
            try {
                await db.ref(`posts/${server}/${key}`).remove();
                alert('تم الحذف بنجاح');
                loadMyPosts();
            } catch(e) {
                alert('خطأ في الحذف: ' + e.message);
            }
        }
    </script>
</body>
</html>
